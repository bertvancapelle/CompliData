version: "3.9"

services:
  # --- PostgreSQL 16 ---
  postgres:
    image: postgres:16-alpine
    container_name: lk-postgres
    environment:
      POSTGRES_DB: likara
      POSTGRES_USER: lk_admin
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      # CD055 (B): named volume i.p.v. host-bind-mount, zodat `docker compose down -v`
      # de DB daadwerkelijk reset (de gedocumenteerde reseed-methode klopt weer).
      - lk_postgres_data:/var/lib/postgresql/data
      - ./init-db:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lk_admin -d likara"]
      interval: 5s
      retries: 5

  # --- Keycloak 24.x ---
  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    container_name: lk-keycloak
    command: start-dev --health-enabled=true --import-realm
    environment:
      KC_DB: postgres
      # CD055 (A1): Keycloak heeft een eigen database `keycloak` + eigen rol `kc_user`
      # (aangemaakt door init-db/02_keycloak.sql). Nooit meer de app-DB likara —
      # lost de COMPONENT-collision op en houdt Keycloak uit de likara-dump (OP-22).
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak
      KC_DB_USERNAME: kc_user
      KC_DB_PASSWORD: ${KC_DB_PASSWORD:-changeme_dev}
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
    ports:
      - "8080:8080"
    volumes:
      - ~/likara/data/keycloak:/opt/keycloak/data
      - ./keycloak/realms:/opt/keycloak/data/import
      - ./keycloak/themes:/opt/keycloak/themes
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'exec 3<>/dev/tcp/localhost/8080 && printf \"GET /health/live HTTP/1.0\\r\\nHost: localhost\\r\\n\\r\\n\" >&3 && cat <&3 | grep -q \"UP\"'"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s
    depends_on:
      postgres:
        condition: service_healthy

  # --- RabbitMQ 3.13 ---
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: lk-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: lk_rabbit
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    volumes:
      - ~/likara/data/rabbitmq:/var/lib/rabbitmq
      - ./rabbitmq/rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf:ro
      - ./rabbitmq/definitions.json:/etc/rabbitmq/definitions.json:ro

  # --- Redis 7 (rate limiting + auth-fail counters) ---
  redis:
    image: redis:7-alpine
    container_name: lk-redis
    command: redis-server --save ""
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 3

  # --- MinIO S3-compatible blob store (bucket-per-tenant) ---
  minio:
    image: minio/minio:latest
    container_name: lk-minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-likara_admin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-changeme_dev_only}
    volumes:
      - ~/likara/data/minio:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3

  # --- Init/migrate-container (ADR-011) — migreert als lk_admin, seedt, sluit af ---
  # Verbindt UITSLUITEND hier als lk_admin (superuser/owner). De app-container
  # (lk-api) houdt enkel lk_app. Run-to-completion vóór de app start.
  migrate:
    image: likara-api:local
    container_name: lk-migrate
    command: ["sh", "-c", "python3 -m alembic upgrade head && python3 -m app.platform_init"]
    environment:
      # Init-container: lk_admin voor migratie+seed (ADR-011). PLATFORM_DATABASE_URL
      # is alleen aanwezig zodat Settings() instantieert; de init gebruikt het niet.
      DATABASE_URL: postgresql+asyncpg://lk_admin:${POSTGRES_PASSWORD}@postgres:5432/likara
      DATABASE_URL_SYNC: postgresql://lk_admin:${POSTGRES_PASSWORD}@postgres:5432/likara
      ADMIN_DATABASE_URL: postgresql+asyncpg://lk_admin:${POSTGRES_PASSWORD}@postgres:5432/likara
      PLATFORM_DATABASE_URL: postgresql+asyncpg://lk_platform:${POSTGRES_PASSWORD}@postgres:5432/likara
      KEYCLOAK_URL: http://keycloak:8080
      KEYCLOAK_REALM: likara
      KEYCLOAK_CLIENT_ID: likara-api
      KEYCLOAK_CLIENT_SECRET: ${KEYCLOAK_CLIENT_SECRET:-changeme_dev}
      RABBITMQ_URL: amqp://lk_rabbit:${RABBITMQ_PASSWORD}@rabbitmq:5672/
      REDIS_URL: redis://redis:6379/0
    restart: "no"
    volumes:
      - ./backend:/app
      # platform_init seedt referentiedata uit de bwb_ontvlechting-module;
      # die code valt buiten de api-build-context (./backend) en wordt hier
      # bijgemount op het pad dat platform_init verwacht (/modules/...).
      - ./modules:/modules
    depends_on:
      postgres:
        condition: service_healthy

  # --- LIKARA API ---
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: likara-api:local
    container_name: lk-api
    # Lokaal-dev-only: hot-reload i.p.v. het Dockerfile-CMD (`--workers 2`, prod-default).
    # uvicorn staat `--reload` niet toe naast meerdere workers → één worker in dev.
    # De code zit op twee mounts (/app + /modules); beide in de reload-scope, anders
    # worden module-wijzigingen niet opgepikt. NIET voor productie (geen reload, multi-worker).
    command:
      ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000",
       "--reload", "--reload-dir", "/app", "--reload-dir", "/modules"]
    environment:
      # App-laag: UITSLUITEND lk_app (RLS) + lk_platform (platform-endpoints).
      # GEEN lk_admin in de app-container (OP-11 / ADR-012).
      DATABASE_URL: postgresql+asyncpg://lk_app:${POSTGRES_PASSWORD}@postgres:5432/likara
      DATABASE_URL_SYNC: postgresql://lk_app:${POSTGRES_PASSWORD}@postgres:5432/likara
      PLATFORM_DATABASE_URL: postgresql+asyncpg://lk_platform:${POSTGRES_PASSWORD}@postgres:5432/likara
      KEYCLOAK_URL: http://keycloak:8080
      KEYCLOAK_EXTERNAL_URL: http://localhost:8080
      KEYCLOAK_REALM: likara
      KEYCLOAK_CLIENT_ID: likara-api
      KEYCLOAK_CLIENT_SECRET: ${KEYCLOAK_CLIENT_SECRET:-changeme_dev}
      RABBITMQ_URL: amqp://lk_rabbit:${RABBITMQ_PASSWORD}@rabbitmq:5672/
      REDIS_URL: redis://redis:6379/0
      MINIO_ENDPOINT_URL: http://minio:9000
      MINIO_EXTERNAL_URL: http://localhost:9000
      # Lokaal-dev-only: de cd_session-cookie mag over http://localhost worden
      # gezet (anders dropt o.a. Safari de Secure-cookie). Productie houdt
      # secure=True via eigen config (OP-5). NIET voor productie gebruiken.
      COOKIE_SECURE: "false"
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      # Module-code (routers/services/schemas) valt buiten de api-build-context
      # (./backend) en wordt hier bijgemount op het pad dat app.main verwacht
      # (/modules/...), net als bij de migrate-container.
      - ./modules:/modules
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      keycloak:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy

  # --- LIKARA UI ---
  # Profile production: alleen starten met --profile production.
  # Lokale ontwikkeling: gebruik `npm run dev` in frontend/.
  ui:
    profiles:
      - production
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: lk-ui
    ports:
      - "3000:3000"
    depends_on:
      - api

# CD055 (B): named volume voor de Postgres-data. `down -v` verwijdert dit volume →
# schone reset (init-scripts + migratie + seed lopen opnieuw). De overige services
# houden hun host-bind-mounts (buiten scope van deze fix).
volumes:
  lk_postgres_data:
